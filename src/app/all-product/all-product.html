<app-top-nav></app-top-nav>
<div class="products-listing-container">
  <header class="category-header bg-black py-24 text-center">
    <h1 class="text-white text-4xl md:text-5xl font-bold uppercase tracking-[0.1em]">
      {{ searchQuery ? 'Search Results' : 'Headphones' }}
    </h1>
    <p *ngIf="searchQuery" class="text-gray-400 mt-4">
      Found {{ products.length }} result(s) for "{{ searchQuery }}"
    </p>
  </header>

  <section class="products-stack max-w-[1110px] mx-auto py-40 px-6 space-y-40">
    <div *ngIf="products.length === 0" class="text-center py-20">
      <p class="text-xl text-gray-500">
        {{ searchQuery ? 'No products found matching your search.' : 'No products available.' }}
      </p>
    </div>

    <div *ngFor="let product of products; let i = index" 
         class="product-item flex flex-col lg:flex-row items-center gap-12 lg:gap-32"
         [class.lg:flex-row-reverse]="i % 2 !== 0">
      
      <div class="product-image w-full lg:w-1/2 bg-zinc-100 rounded-lg p-12 lg:p-24 flex justify-center">
        <div class="stack">
          <div class="card">
            <div class="image">
              <img [src]="product.image" [alt]="product.name">
            </div>
          </div>
        </div>
      </div>

      <div class="product-info w-full lg:w-1/2 flex flex-col items-start gap-6 lg:gap-8 text-center lg:text-left">
        <span *ngIf="product.isNew" class="text-[#D87D4A] uppercase tracking-[10px] text-sm font-normal">New Product</span>
        <h2 class="text-4xl md:text-5xl font-bold uppercase tracking-wider leading-tight max-w-sm mx-auto lg:mx-0">
          {{ product.name }}
        </h2>
        <p class="text-zinc-500 text-lg leading-relaxed max-w-md mx-auto lg:mx-0">
          {{ product.description }}
        </p>
        <div class="flex flex-col sm:flex-row gap-4">
          <button (click)="viewProduct(product.id)" class="relative group cursor-pointer text-white overflow-hidden h-16 w-64 rounded-md bg-[#D87D4A] p-2 flex justify-center items-center font-extrabold">
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-40 h-40 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-[#cc6d35]"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-32 h-32 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-[#D87D4A]"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-24 h-24 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-[#e89560]"></div>
            <div class="absolute top-3 right-20 group-hover:top-12 group-hover:-right-12 z-10 w-14 h-14 rounded-full group-hover:scale-150 group-hover:opacity-50 duration-500 bg-[#f0a878]"></div>
            <p class="z-10 uppercase tracking-widest">See Product</p>
          </button>
          <button (click)="addToCart(product)" class="add-to-cart-btn">
            <div class="default-btn">
              <svg
                viewBox="0 0 24 24"
                width="20"
                height="20"
                stroke="#ffffff"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="cart-icon"
              >
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                ></path>
              </svg>
              <span>Add to Cart</span>
            </div>
            <div class="hover-btn">
              <svg
                viewBox="0 0 320 512"
                width="12.5"
                height="20"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M160 0c17.7 0 32 14.3 32 32V67.7c1.6 .2 3.1 .4 4.7 .7c.4 .1 .7 .1 1.1 .2l48 8.8c17.4 3.2 28.9 19.9 25.7 37.2s-19.9 28.9-37.2 25.7l-47.5-8.7c-31.3-4.6-58.9-1.5-78.3 6.2s-27.2 18.3-29 28.1c-2 10.7-.5 16.7 1.2 20.4c1.8 3.9 5.5 8.3 12.8 13.2c16.3 10.7 41.3 17.7 73.7 26.3l2.9 .8c28.6 7.6 63.6 16.8 89.6 33.8c14.2 9.3 27.6 21.9 35.9 39.5c8.5 17.9 10.3 37.9 6.4 59.2c-6.9 38-33.1 63.4-65.6 76.7c-13.7 5.6-28.6 9.2-44.4 11V480c0 17.7-14.3 32-32 32s-32-14.3-32-32V445.1c-.4-.1-.9-.1-1.3-.2l-.2 0 0 0c-24.4-3.8-64.5-14.3-91.5-26.3c-16.1-7.2-23.4-26.1-16.2-42.2s26.1-23.4 42.2-16.2c20.9 9.3 55.3 18.5 75.2 21.6c31.9 4.7 58.2 2 76-5.3c16.9-6.9 24.6-16.9 26.8-28.9c1.9-10.6 .4-16.7-1.3-20.4c-1.9-4-5.6-8.4-13-13.3c-16.4-10.7-41.5-17.7-74-26.3l-2.8-.7 0 0C119.4 279.3 84.4 270 58.4 253c-14.2-9.3-27.5-22-35.8-39.6c-8.4-17.9-10.1-37.9-6.1-59.2C23.7 116 52.3 91.2 84.8 78.3c13.3-5.3 27.9-8.9 43.2-11V32c0-17.7 14.3 32 32-32z"
                  fill="#ffffff"
                ></path>
              </svg>
              <span>{{ product.price | number }}DT</span>
            </div>
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Categories Navigation Section (Reused from Home) -->

</div>
