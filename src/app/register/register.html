<div class="auth-wrapper min-h-screen flex items-center justify-center p-6">
  <div class="card auth-card p-12 w-full max-w-md">
    <h1 class="text-3xl font-bold uppercase text-center mb-10">Create an Account</h1>
    
    <form (ngSubmit)="onRegister()" class="space-y-6">
      <div class="flex flex-col gap-2">
        <label class="text-xs font-bold uppercase">Name</label>
        <input type="text" name="name" placeholder="Insert your name" class="input-field" [(ngModel)]="data.name">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-bold uppercase">Email Address</label>
        <input type="email" name="email" placeholder="alexei@mail.com" class="input-field" [(ngModel)]="data.email">
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-xs font-bold uppercase">Password</label>
        <input type="password" name="password" placeholder="Create a password" class="input-field" [(ngModel)]="data.password">
      </div>
      <button type="submit" class="btn btn-primary w-full py-4 uppercase font-bold tracking-widest">
        Register
      </button>
    </form>

    <p class="text-center mt-8 muted">
      Already have an account? <a routerLink="/login" class="accent font-bold hover:underline">Login</a>
    </p>
  </div>
</div>
