    // Apply saved theme early to avoid flicker
    (function(){
      try{
        const theme = localStorage.getItem('theme') || 'light';
        if(theme === 'dark'){
          document.documentElement.classList.add('dark-theme');
        } else {
          document.documentElement.classList.remove('dark-theme');
        }
      }catch(e){/* ignore */}
    })();
